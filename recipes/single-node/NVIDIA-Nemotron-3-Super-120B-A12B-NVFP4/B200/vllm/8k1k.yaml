name: "nemotron-super-120b-nvfp4-vllm-b200-8k1k"

model:
  path: "hf:nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0-deepseek-v4-cuda13-dev.3"
  precision: "fp4"

identity:
  model:
    repo: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    revision: "4f0cf9daaeb7a4d5e23f80a00e7ed15f0e03caf6"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.0-deepseek-v4-cuda13-dev.3"
  frameworks:
    dynamo: "1.2.0"
    vllm: "0.20.1"

dynamo:
  install: false

resources:
  gpu_type: "b200"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"

  vllm_config:
    aggregated:
      served-model-name: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
      tensor-parallel-size: "{tp}"
      pipeline-parallel-size: "{pp}"
      data-parallel-size: "{dp}"
      enable-expert-parallel: "{ep}"
      max-num-seqs: 1024
      max-model-len: 9472
      gpu-memory-utilization: 0.9
      no-enable-prefix-caching: true
      async-scheduling: true
      quantization: modelopt
      max-cudagraph-capture-size: 1024
      trust-remote-code: true
      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "FLASHINFER"


benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 1

sweep:
  tp: [1, 2, 4, 8]
  pp: [1, 2, 4, 8]
  dp: [1, 2, 4, 8]
  ep: [true, false]
