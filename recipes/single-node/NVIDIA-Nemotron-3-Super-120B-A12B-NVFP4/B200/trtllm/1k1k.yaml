name: "nemotron-super-120b-nvfp4-trtllm-b200-1k1k"

model:
  path: "hf:nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.1"
  precision: "fp4"

identity:
  model:
    repo: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    revision: "4f0cf9daaeb7a4d5e23f80a00e7ed15f0e03caf6"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.1"
  frameworks:
    dynamo: "1.1.1"
    tensorrt_llm: "1.3.0rc13"

dynamo:
  install: false

resources:
  gpu_type: "b200"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: trtllm

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    TLLM_LOG_LEVEL: "INFO"

  trtllm_config:
    aggregated:
      backend: "pytorch"
      tensor_parallel_size: "{tp}"
      pipeline_parallel_size: "{pp}"
      moe_expert_parallel_size: "{ep}"
      max_batch_size: 1024
      max_num_tokens: 2176
      max_seq_len: 2176
      trust_remote_code: true

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_warmup_mult: 1

sweep:
  tp: [1, 2, 4, 8]
  pp: [1, 2, 4, 8]
  ep: [1, 2, 4, 8]
