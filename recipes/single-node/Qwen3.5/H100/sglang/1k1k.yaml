# ** Upstream reference:
#   https://github.com/SemiAnalysisAI/InferenceX/blob/main/benchmarks/single_node/fixed_seq_len/qwen3.5_fp8_h100.sh

name: "qwen3.5-397b-a17b-fp8-sglang-h100-1k1k-conc64-h100chart"
setup_script: "sglang-container-deps.sh"

model:
  path: "hf:Qwen/Qwen3.5-397B-A17B-FP8"
  container: "lmsysorg/sglang:v0.5.12-cu130"
  precision: "fp8"

identity:
  model:
    repo: "Qwen/Qwen3.5-397B-A17B-FP8"
  container:
    image: "lmsysorg/sglang:v0.5.12-cu130"
  frameworks:
    dynamo: "1.2.0.dev20260426"
    sglang: "0.5.12"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "h100"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    PYTHONNOUSERSITE: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"

  sglang_config:
    aggregated:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      tensor-parallel-size: "{tp}"
      expert-parallel-size: "{ep}"
      reasoning-parser: "qwen3"
      tool-call-parser: "qwen3_coder"
      enable-flashinfer-allreduce-fusion: true
      max-running-requests: 256
      chunked-prefill-size: 16384
      decode-log-interval: 1
      mem-fraction-static: 0.8
      cuda-graph-max-bs: "{conc}"
      context-length: 2068
      kv-cache-dtype: fp8_e4m3
      quantization: fp8
      attention-backend: flashinfer
      stream-interval: 50
      tokenizer-worker-num: 6
      mamba-ssm-dtype: bfloat16
      disable-radix-cache: true
      enable-symm-mem: true
      trust-remote-code: true
      scheduler-recv-interval: 600

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: ["{conc}"]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 1

sweep:
  conc: [1, 2, 4, 8, 16, 32, 64, 128, 256]
  tp:   [8]
  ep:   [8]
