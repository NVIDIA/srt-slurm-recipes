# Upstream reference: https://github.com/SemiAnalysisAI/InferenceX/tree/main/benchmarks/single_node
name: "qwen3.5-397b-a17b-fp8-sglang-mtp-h200-1k1k"

model:
  path: "hf:Qwen/Qwen3.5-397B-A17B-FP8"
  container: "nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1"
  precision: "fp8"

identity:
  model:
    repo: "Qwen/Qwen3.5-397B-A17B-FP8"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.1"
  frameworks:
    dynamo: "1.2.1"
    sglang: "0.5.11"

dynamo:
  install: false

slurm:
  time_limit: "02:00:00"

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "h200"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    PYTHONNOUSERSITE: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    SGLANG_ENABLE_SPEC_V2: "1"

  sglang_config:
    aggregated:
      served-model-name: "Qwen/Qwen3.5-397B-A17B-FP8"
      tensor-parallel-size: "{tp}"
      expert-parallel-size: "{ep}"
      reasoning-parser: "qwen3"
      tool-call-parser: "qwen3_coder"
      trust-remote-code: true
      enable-flashinfer-allreduce-fusion: true
      max-running-requests: 256
      chunked-prefill-size: 8192
      decode-log-interval: 1
      mem-fraction-static: 0.75
      cuda-graph-max-bs: "{conc}"
      context-length: 2068
      kv-cache-dtype: fp8_e4m3
      quantization: fp8
      attention-backend: flashinfer
      stream-interval: 50
      mamba-ssm-dtype: bfloat16
      disable-radix-cache: true
      speculative-algorithm: EAGLE
      speculative-num-steps: 3
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 4

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: ["{conc}"]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 1
  use_chat_template: true

sweep:
  conc: [2, 4, 8, 16, 32, 64, 128]
  tp:   [8]
  ep:   [8]
