name: "nemotron-ultra-nvfp4-b200-vllm-1k1k"

model:
  path: "hf:nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.3.0-nemotron-ultra-dev.1"
  precision: "fp4"

dynamo:
  install: false

health_check:
  max_attempts: 540
  interval_seconds: 10

resources:
  gpu_type: "b200"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"

  vllm_config:
    aggregated:
      served-model-name: "nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-NVFP4"
      tensor-parallel-size: "{tp}"
      pipeline-parallel-size: "{pp}"
      enable-expert-parallel: "{ep}"
      max-model-len: 16384
      max-num-seqs: 1024
      trust-remote-code: true

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "1x32x256x1024"
  req_rate: "inf"
  random_range_ratio: 0
  num_prompts_mult: 3
  num_warmup_mult: 1

sweep:
  tp: [4, 8]
  pp: [1]
  ep: [true, false]
