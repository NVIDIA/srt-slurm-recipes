# ** Upstream reference:
#   https://github.com/SemiAnalysisAI/InferenceX/blob/main/benchmarks/single_node/fixed_seq_len/dsv4_fp4_b300_vllm.sh
name: "dsv4-pro-b300-fp4-agg-tp8-8k1k"

model:
  path: "hf:nvidia/DeepSeek-V4-Pro-NVFP4"
  container: "vllm/vllm-openai:v0.22.0"
  precision: "fp4"

identity:
  model:
    repo: "nvidia/DeepSeek-V4-Pro-NVFP4"
    revision: "d6acf0cb1d951e23a84b8941b909f79a04c20662"
  container:
    image: "vllm/vllm-openai:v0.22.0"
  frameworks:
    dynamo: "1.2.0.dev20260426"
    vllm: "0.22.0"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

health_check:
  max_attempts: 360
  interval_seconds: 10

resources:
  gpu_type: "b300"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"

  vllm_config:
    aggregated:
      served-model-name: "nvidia/DeepSeek-V4-Pro-NVFP4"
      tensor-parallel-size: 8
      pipeline-parallel-size: 1
      kv-cache-dtype: "fp8"
      trust-remote-code: true
      block-size: 256
      no-enable-prefix-caching: true
      compilation-config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
      attention-config: '{"use_fp4_indexer_cache": true}'
      tokenizer-mode: deepseek_v4
      reasoning-parser: deepseek_v4
      max-cudagraph-capture-size: 2048
      max-model-len: 9300
      max-num-batched-tokens: 16384

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  random_range_ratio: 0.8
  num_prompts_mult: 10
  concurrencies: "2x4x8x16x32x64x128x256x512x2048"
  req_rate: "inf"
  custom_tokenizer: "sa_bench_tokenizers.vllm_deepseek_v4.VLLMDeepseekV4Tokenizer"
  use_chat_template: true
