# Upstream reference: https://github.com/SemiAnalysisAI/InferenceX/blob/main/benchmarks/single_node/fixed_seq_len/dsv4_fp8_h200_mtp.sh

name: "deepseek-v4-pro-fp8-vllm-mtp-h200-1k1k"

model:
  path: "hf:deepseek-ai/DeepSeek-V4-Pro"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1"
  precision: "fp8"

identity:
  model:
    repo: "deepseek-ai/DeepSeek-V4-Pro"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1"
  frameworks:
    dynamo: "1.2.1"
    vllm: "0.21.0"

dynamo:
  install: false

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "h200"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    PYTHONNOUSERSITE: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"

  vllm_config:
    aggregated:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      tensor-parallel-size: 1
      data-parallel-size: 8
      enable-expert-parallel: true
      trust-remote-code: true
      kv-cache-dtype: fp8
      block-size: 256
      no-enable-prefix-caching: true
      max-model-len: 2304
      quantization: deepseek_v4_fp8
      gpu-memory-utilization: 0.95
      max-num-seqs: 512
      max-num-batched-tokens: 512
      no-enable-flashinfer-autotune: true
      compilation-config: '{"mode":0,"cudagraph_mode":"FULL_DECODE_ONLY"}'
      speculative-config: '{"method":"mtp","num_speculative_tokens":2}'
      tokenizer-mode: deepseek_v4

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: ["{conc}"]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2
  use_chat_template: true
  custom_tokenizer: "sa_bench_tokenizers.vllm_deepseek_v4.VLLMDeepseekV4Tokenizer"

sweep:
  conc: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
