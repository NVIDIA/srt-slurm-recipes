# Upstream reference:
#   https://docs.vllm.ai/projects/recipes/en/latest/OpenAI/GPT-OSS.html

name: "gpt-oss-120b-fp4-vllm-h100-1k1k-eagle"

model:
  path: "hf:openai/gpt-oss-120b"
  container: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1"
  precision: "fp4"

identity:
  model:
    repo: "openai/gpt-oss-120b"
    revision: "b5c939de8f754692c1647ca79fbf85e8c1e70f8a"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1"
  frameworks:
    dynamo: "1.1.1"
    vllm: "0.19.0"

dynamo:
  install: false

resources:
  gpu_type: "h100"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    PYTHONNOUSERSITE: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    VLLM_MXFP4_USE_MARLIN: "1"

  vllm_config:
    aggregated:
      served-model-name: "openai/gpt-oss-120b"
      tensor-parallel-size: "{tp}"
      max-num-seqs: 1024
      max-model-len: 10240
      max-num-batched-tokens: 8192
      max-cudagraph-capture-size: 2048
      gpu-memory-utilization: 0.9
      no-enable-prefix-caching: true
      speculative-config: '{"method":"eagle3","model":"nvidia/gpt-oss-120b-Eagle3-short-context","num_speculative_tokens":3}'
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY"}'

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2

sweep:
  tp: [1, 2, 4, 8]
