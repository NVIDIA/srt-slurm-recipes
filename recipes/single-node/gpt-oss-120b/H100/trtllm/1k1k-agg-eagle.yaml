# Upstream reference:
#   https://github.com/NVIDIA/TensorRT-LLM/blob/main/docs/source/blogs/tech_blog/blog11_GPT_OSS_Eagle3.md

name: "gpt-oss-120b-trtllm-agg-h100-1k1k-eagle"

model:
  path: "hf:openai/gpt-oss-120b"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.3"
  precision: "fp4"

identity:
  model:
    repo: "openai/gpt-oss-120b"
    revision: "b5c939de8f754692c1647ca79fbf85e8c1e70f8a"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.3"
  frameworks:
    dynamo: "1.1.0"
    tensorrt_llm: "1.3.0rc11"

dynamo:
  install: false

resources:
  gpu_type: "h100"
  gpus_per_node: 8
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: "{tp}"

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: trtllm

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    TLLM_LOG_LEVEL: "INFO"

  trtllm_config:
    aggregated:
      backend: "pytorch"
      tensor_parallel_size: "{tp}"
      moe_expert_parallel_size: 1
      max_batch_size: 1024
      max_num_tokens: 20000
      max_seq_len: 2248
      trust_remote_code: true
      speculative_config:
        decoding_type: "Eagle"
        eagle3_one_model: true
        max_draft_len: 3
        speculative_model_dir: "nvidia/gpt-oss-120b-Eagle3-short-context"

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2

health_check:
  max_attempts: 540
  interval_seconds: 10

sweep:
  tp: [4, 8]
