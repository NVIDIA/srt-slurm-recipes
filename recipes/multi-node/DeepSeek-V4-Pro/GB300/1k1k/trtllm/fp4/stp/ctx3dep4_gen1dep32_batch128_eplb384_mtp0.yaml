# Ported from NVIDIA/srt-slurm:
#   https://github.com/NVIDIA/srt-slurm/blob/sa-submission-q2-2026/recipes/DeepSeek-V4-Pro/disagg/trtllm_dynamo/gb300_mxfp4/ISL1K_OSL1K/STP/ctx3dep4_gen1dep32_batch128_eplb384_mtp0.yaml
name: "dsv4pro_mxfp4_ISL1K_OSL1K_ctx3dep4_gen1dep32_batch128_eplb384_mtp0"

# ctx: 3 prefill workers, TP4/EP4, EPLB: num_slots=384
# gen: 1 decode worker, TP32/EP32, enable_attention_dp=true, max_batch=128
# concurrency: 4301

model:
  path: "hf:deepseek-ai/DeepSeek-V4-Pro"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0-deepseek-v4-dev.1"
  precision: "fp4"

extra_mount:
  - "tmpfs:/dev/shm:size=100%"
  - "configs/dsv4-moe-load-balancer-configs:/dsv4-eplb-configs"
resources:
  gpu_type: "gb300"

  prefill_nodes: 3
  prefill_workers: 3
  gpus_per_prefill: 4

  decode_workers: 1
  decode_nodes: 8
  gpus_per_decode: 32

  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    TRT_LLM_DISABLE_LOAD_WEIGHTS_IN_PARALLEL: "1"
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "-1"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  decode_environment:
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "0"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  trtllm_config:
    prefill:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config: null
      disable_overlap_scheduler: true
      enable_attention_dp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.5
        tokens_per_block: 128
      max_batch_size: 16
      max_num_tokens: 8192
      max_seq_len: 1064
      moe_config:
        backend: TRTLLM
        load_balancer: "/dsv4-eplb-configs/moe_load_balancer_ctx_ep4_384.yaml"
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      tensor_parallel_size: 4

    decode:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config:
        batch_sizes:
          - 1
          - 2
          - 4
          - 8
          - 16
          - 24
          - 32
          - 40
          - 48
          - 56
          - 64
          - 72
          - 80
          - 88
          - 96
          - 104
          - 112
          - 120
          - 128
        enable_padding: true
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: false
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.7
        tokens_per_block: 128
      max_batch_size: 128
      max_num_tokens: 128
      max_seq_len: 2088
      moe_config:
        backend: MEGAMOE_DEEPGEMM
        load_balancer: "/dsv4-eplb-configs/moe_load_balancer_gen_ep32_slots384.yaml"
        use_low_precision_moe_combine: true
      moe_expert_parallel_size: 32
      num_postprocess_workers: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      stream_interval: 100
      tensor_parallel_size: 32

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "4301"
  req_rate: "inf"
  num_prompts_mult: 10
  custom_tokenizer: "sa_bench_tokenizers.sglang_deepseek_v4.SGLangDeepseekV4Tokenizer"
  use_chat_template: true

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 720
  interval_seconds: 10

dynamo:
  install: false
