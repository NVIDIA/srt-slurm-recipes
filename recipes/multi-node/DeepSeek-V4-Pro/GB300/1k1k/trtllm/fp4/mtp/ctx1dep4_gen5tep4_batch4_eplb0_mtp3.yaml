# Ported from NVIDIA/srt-slurm:
#   https://github.com/NVIDIA/srt-slurm/blob/sa-submission-q2-2026/recipes/DeepSeek-V4-Pro/disagg/trtllm_dynamo/gb300_mxfp4/ISL1K_OSL1K/MTP/ctx1dep4_gen5tep4_batch4_eplb0_mtp3.yaml
name: "dsv4pro_mxfp4_ISL1K_OSL1K_ctx1dep4_gen5tep4_batch4_eplb0_mtp3"

# ctx: 1 prefill worker, TP4/EP4
# gen: 5 decode workers, TP4/EP4, max_batch=4
# concurrency: 25

model:
  path: "hf:deepseek-ai/DeepSeek-V4-Pro"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0-deepseek-v4-dev.1"
  precision: "fp4"
resources:
  gpu_type: "gb300"

  prefill_nodes: 1
  prefill_workers: 1
  gpus_per_prefill: 4

  decode_workers: 5
  decode_nodes: 5
  gpus_per_decode: 4

  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "0"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  decode_environment:
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "0"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  trtllm_config:
    prefill:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config: null
      disable_overlap_scheduler: true
      enable_attention_dp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.5
        tokens_per_block: 128
      max_batch_size: 16
      max_num_tokens: 8192
      max_seq_len: 1064
      moe_config:
        backend: TRTLLM
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 3
      tensor_parallel_size: 4

    decode:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config:
        batch_sizes:
          - 1
          - 2
          - 4
        enable_padding: true
      enable_attention_dp: false
      enable_lm_head_tp_in_adp: false
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.9
        tokens_per_block: 128
      max_batch_size: 4
      max_num_tokens: 16
      max_seq_len: 2088
      moe_config:
        backend: TRTLLM
        use_low_precision_moe_combine: true
      moe_expert_parallel_size: 4
      num_postprocess_workers: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 3
      stream_interval: 100
      tensor_parallel_size: 4

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "25"
  req_rate: "inf"
  num_prompts_mult: 10
  custom_tokenizer: "sa_bench_tokenizers.sglang_deepseek_v4.SGLangDeepseekV4Tokenizer"
  use_chat_template: true

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 720
  interval_seconds: 10

dynamo:
  install: false
