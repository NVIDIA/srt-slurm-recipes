# Ported from NVIDIA/srt-slurm:
#   https://github.com/NVIDIA/srt-slurm/blob/sa-submission-q2-2026/recipes/DeepSeek-V4-Pro/disagg/trtllm_dynamo/gb300_mxfp4/ISL1K_OSL1K/MTP/ctx2dep4_gen1dep8_batch1024_eplb384_mtp1.yaml
name: "dsv4pro_mxfp4_ISL1K_OSL1K_ctx2dep4_gen1dep8_batch1024_eplb384_mtp1"

# ctx: 2 prefill workers, TP4/EP4, EPLB: num_slots=384
# gen: 1 decode worker, TP8/EP8, enable_attention_dp=true, max_batch=1024
# concurrency: 8192

model:
  path: "hf:deepseek-ai/DeepSeek-V4-Pro"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0-deepseek-v4-dev.1"
  precision: "fp4"

extra_mount:
  - "tmpfs:/dev/shm:size=100%"
  - "configs/dsv4-moe-load-balancer-configs:/dsv4-eplb-configs"
resources:
  gpu_type: "gb300"

  prefill_nodes: 2
  prefill_workers: 2
  gpus_per_prefill: 4

  decode_workers: 1
  decode_nodes: 2
  gpus_per_decode: 8

  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    TRT_LLM_DISABLE_LOAD_WEIGHTS_IN_PARALLEL: "1"
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "-1"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  decode_environment:
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"
    PYTHONUNBUFFERED: "1"
    ENROOT_ALLOW_DEV: "yes"
    MIMALLOC_PURGE_DELAY: "0"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    PYTHONWARNINGS: "ignore::DeprecationWarning:cutlass.cute.core"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"

  trtllm_config:
    prefill:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config: null
      disable_overlap_scheduler: true
      enable_attention_dp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.5
        tokens_per_block: 128
      max_batch_size: 16
      max_num_tokens: 8192
      max_seq_len: 1064
      moe_config:
        backend: TRTLLM
        load_balancer: "/dsv4-eplb-configs/moe_load_balancer_ctx_ep4_384.yaml"
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 1
      tensor_parallel_size: 4

    decode:
      cache_transceiver_config:
        backend: NIXL
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 8192
        transceiver_runtime: PYTHON
      cuda_graph_config:
        batch_sizes:
          - 1
          - 2
          - 4
          - 8
          - 16
          - 24
          - 32
          - 40
          - 48
          - 56
          - 64
          - 72
