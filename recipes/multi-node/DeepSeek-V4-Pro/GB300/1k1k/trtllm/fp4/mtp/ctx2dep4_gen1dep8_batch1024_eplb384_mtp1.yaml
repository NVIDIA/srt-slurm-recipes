        enable_padding: true
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: true
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.8
        tokens_per_block: 128
      max_batch_size: 1024
      max_num_tokens: 2048
      max_seq_len: 2088
      moe_config:
        backend: MEGAMOE_DEEPGEMM
        load_balancer: "/dsv4-eplb-configs/moe_load_balancer_gen_ep8_slots384.yaml"
        use_low_precision_moe_combine: true
      moe_expert_parallel_size: 8
      num_postprocess_workers: 4
      pipeline_parallel_size: 1
      print_iter_log: true
      trust_remote_code: true
      speculative_config:
        decoding_type: MTP
        max_draft_len: 1
      stream_interval: 100
      tensor_parallel_size: 8

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "8192"
  req_rate: "inf"
  num_prompts_mult: 10
  custom_tokenizer: "sa_bench_tokenizers.sglang_deepseek_v4.SGLangDeepseekV4Tokenizer"
  use_chat_template: true

frontend:
  type: "dynamo"
  enable_multiple_frontends: false

health_check:
  max_attempts: 720
  interval_seconds: 10

dynamo:
  install: false
