# Reference: https://github.com/NVIDIA/srt-slurm/blob/main/recipes/gb200-fp4/1k1k/low-latency.yaml

name: "deepseek-r1-gb200-sglang-1k1k-low-latency"

model:
  path: "hf:nvidia/DeepSeek-R1-0528-FP4-v2"
  container: "lmsysorg/sglang:v0.5.8.post1-cu130-runtime"
  precision: "fp4"

identity:
  model:
    repo: "nvidia/DeepSeek-R1-0528-FP4-v2"
    revision: "25a138f28f49022958b9f2d205f9b7de0cdb6e18"
  container:
    image: "lmsysorg/sglang:v0.5.8.post1-cu130-runtime"
  frameworks:
    dynamo: "0.8.0"
    sglang: "0.5.8.post1"
  # Runtime fingerprint: sglang source commit c1f2241a32b69be69828288b61331887c5647a4b.

dynamo:
  install: true

frontend:
  type: dynamo
  enable_multiple_frontends: true
  num_additional_frontends: 3

resources:
  gpu_type: "gb200"
  prefill_nodes: 1
  prefill_workers: 1
  decode_nodes: 2
  decode_workers: 2
  gpus_per_node: 4

backend:
  type: sglang

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_ENABLE_JIT_DEEPGEMM: "false"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_DECODE_BOOTSTRAP_TIMEOUT: "1000"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_ENABLE_JIT_DEEPGEMM: "false"

  sglang_config:
    prefill:
      disaggregation-mode: "prefill"
      served-model-name: "deepseek-ai/DeepSeek-R1-0528"
      trust-remote-code: true
      disable-radix-cache: true
      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "trtllm_mla"
      quantization: "modelopt_fp4"
      moe-runner-backend: "flashinfer_trtllm"
      stream-interval: 10
      watchdog-timeout: 1000000
      context-length: 2200
      mem-fraction-static: 0.95
      max-total-tokens: 8192
      chunked-prefill-size: 8192
      cuda-graph-max-bs: 256
      max-running-requests: 512
      scheduler-recv-interval: 10
      enable-symm-mem: true
      load-balance-method: "round_robin"
      disaggregation-bootstrap-port: 30001
      disaggregation-transfer-backend: nixl
      fp4-gemm-backend: "flashinfer_trtllm"
      data-parallel-size: 1
      tensor-parallel-size: 4
      expert-parallel-size: 1

    decode:
      disaggregation-mode: "decode"
      served-model-name: "deepseek-ai/DeepSeek-R1-0528"
      prefill-round-robin-balance: true
      trust-remote-code: true
      disable-radix-cache: true
      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "trtllm_mla"
      quantization: "modelopt_fp4"
      moe-runner-backend: "flashinfer_trtllm"
      disaggregation-bootstrap-port: 30001
      stream-interval: 10
      watchdog-timeout: 1000000
      context-length: 2200
      mem-fraction-static: 0.95
      chunked-prefill-size: 8192
      cuda-graph-max-bs: 256
      scheduler-recv-interval: 10
      enable-symm-mem: true
      disaggregation-transfer-backend: nixl
      fp4-gemm-backend: "flashinfer_trtllm"
      tensor-parallel-size: 4
      expert-parallel-size: 1

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "4x8x32"
  req_rate: "inf"

infra:
  etcd_nats_dedicated_node: true
