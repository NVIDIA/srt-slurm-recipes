# Reference: https://github.com/NVIDIA/srt-slurm/blob/main/recipes/gb200-fp4/1k1k/max-tpt.yaml

name: "deepseek-r1-gb200-sglang-1k1k-max-tpt"

model:
  path: "hf:nvidia/DeepSeek-R1-0528-FP4-v2"
  container: "lmsysorg/sglang:v0.5.8.post1-cu130-runtime"
  precision: "fp4"

identity:
  model:
    repo: "nvidia/DeepSeek-R1-0528-FP4-v2"
    revision: "25a138f28f49022958b9f2d205f9b7de0cdb6e18"
  container:
    image: "lmsysorg/sglang:v0.5.8.post1-cu130-runtime"
  frameworks:
    dynamo: "0.8.0"
    sglang: "0.5.8.post1"
  # Runtime fingerprint: sglang source commit c1f2241a32b69be69828288b61331887c5647a4b.

dynamo:
  install: true

frontend:
  type: dynamo
  enable_multiple_frontends: true
  num_additional_frontends: 9

resources:
  gpu_type: "gb200"
  prefill_nodes: 4
  prefill_workers: 4
  decode_nodes: 12
  decode_workers: 1
  gpus_per_node: 4

backend:
  type: sglang

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_NVFP4_CKPT_FP8_GEMM_IN_ATTN: "1"
    SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_NVFP4_CKPT_FP8_GEMM_IN_ATTN: "1"
    SGLANG_PER_TOKEN_GROUP_QUANT_8BIT_V2: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "1024"
    SGLANG_MOE_NVFP4_DISPATCH: "1"

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-R1-0528"
      trust-remote-code: true

      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "trtllm_mla"

      quantization: "modelopt_fp4"
      moe-runner-backend: "flashinfer_cutlass"

      disable-radix-cache: true
      disable-chunked-prefix-cache: true

      stream-interval: 50
      decode-log-interval: 1000
      watchdog-timeout: 1000000
      context-length: 2176
      disable-shared-experts-fusion: true
      eplb-algorithm: "deepseek"
      disaggregation-bootstrap-port: 30001

      disaggregation-mode: "prefill"

      mem-fraction-static: 0.84
      max-total-tokens: 131072
      max-prefill-tokens: 32768
      chunked-prefill-size: 65536
      enable-single-batch-overlap: true

      max-running-requests: 30000
      load-balance-method: "round_robin"

      disable-cuda-graph: true
      enable-dp-attention: true
      fp4-gemm-backend: "flashinfer_cutlass"
      disaggregation-transfer-backend: nixl

      tp-size: 4
      dp-size: 4
      ep-size: 4

    decode:
      served-model-name: "deepseek-ai/DeepSeek-R1-0528"
      trust-remote-code: true

      kv-cache-dtype: "fp8_e4m3"
      attention-backend: "trtllm_mla"

      quantization: "modelopt_fp4"
      moe-runner-backend: "flashinfer_cutedsl"

      disable-radix-cache: true
      disable-chunked-prefix-cache: true

      stream-interval: 50
      decode-log-interval: 1000
      watchdog-timeout: 1000000
      context-length: 2176
      disable-shared-experts-fusion: true
      eplb-algorithm: "deepseek"
      disaggregation-bootstrap-port: 30001

      disaggregation-mode: "decode"

      mem-fraction-static: 0.83
      max-total-tokens: 3122380
      chunked-prefill-size: 786432

      max-running-requests: 67584
      enable-single-batch-overlap: true

      moe-a2a-backend: "deepep"
      deepep-mode: "low_latency"
      ep-dispatch-algorithm: "static"
      ep-num-redundant-experts: 32

      cuda-graph-bs: [1, 2, 4, 8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 88, 96, 104, 112, 120, 128, 136, 144, 152, 160, 168, 176, 184, 192, 200, 208, 216, 224, 232, 240, 248, 256, 264, 272, 280, 288, 296, 304, 312, 320, 328, 336, 344, 352, 360, 368, 376, 384, 416, 448, 480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 1024]
      num-reserved-decode-tokens: 112

      moe-dense-tp-size: 1
      enable-dp-lm-head: true
      prefill-round-robin-balance: true
      enable-dp-attention: true
      disaggregation-transfer-backend: nixl
      fp4-gemm-backend: "flashinfer_cutlass"

      tp-size: 48
      dp-size: 48
      ep-size: 48

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "2048x4096"
  req_rate: "inf"

infra:
  etcd_nats_dedicated_node: true
