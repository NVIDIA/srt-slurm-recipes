# ** Upstream reference:
#   https://github.com/SemiAnalysisAI/InferenceX/blob/main/benchmarks/single_node/fixed_seq_len/dsr1_fp8_h200_trt_mtp.sh

name: "deepseek-r1-fp8-trtllm-h100-1k8k-mtp-conc4-h200chart"

model:
  path: "hf:deepseek-ai/DeepSeek-R1-0528"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.2.1"
  precision: "fp8"

identity:
  model:
    repo: "deepseek-ai/DeepSeek-R1-0528"
    revision: "4236a6af538feda4548eca9ab308586007567f52"
  container:
    image: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.2.1"
  frameworks:
    dynamo: "1.2.1"
    tensorrt_llm: "1.3.0rc14"

dynamo:
  install: false

health_check:
  max_attempts: 720
  interval_seconds: 10

resources:
  gpu_type: "h100"
  gpus_per_node: 8
  agg_nodes: 2
  agg_workers: 1
  gpus_per_agg: "{tp}"

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: trtllm

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    PYTHONNOUSERSITE: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"
    TRTLLM_ENABLE_PDL: "1"
    TLLM_LOG_LEVEL: "INFO"

  trtllm_config:
    aggregated:
      backend: "pytorch"
      tensor_parallel_size: "{tp}"
      moe_expert_parallel_size: "{ep}"
      enable_attention_dp: false
      max_batch_size: "{conc}"
      max_seq_len: 9216
      max_num_tokens: 1152
      trust_remote_code: true
      print_iter_log: true
      stream_interval: 10
      cuda_graph_config:
        enable_padding: true
        max_batch_size: 128
      kv_cache_config:
        dtype: "fp8"
        free_gpu_memory_fraction: 0.75
        enable_block_reuse: false
      moe_config:
        backend: "CUTLASS"
      speculative_config:
        decoding_type: "MTP"
        num_nextn_predict_layers: 3

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 8192
  concurrencies: ["{conc}"]
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2
  use_chat_template: true

sweep:
  conc: [4, 8, 16, 32, 64, 128]
  tp:   [16]
  ep:   [16]
