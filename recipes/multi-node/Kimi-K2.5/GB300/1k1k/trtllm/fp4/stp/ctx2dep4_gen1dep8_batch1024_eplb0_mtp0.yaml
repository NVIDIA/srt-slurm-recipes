# Ported from NVIDIA/srt-slurm:
#   https://github.com/NVIDIA/srt-slurm/blob/sa-submission-q2-2026/recipes/kimi2.5/trtllm_dynamo/disagg/gb300Nvfp4/ISL1K_OSL1K/STP/ctx2dep4_gen1dep8_batch1024_eplb0_mtp0.yaml
name: "kimi_k25_nvfp4_ISL1K_OSL1K_ctx2dep4_gen1dep8_batch1024_eplb0_mtp0"

# ctx: 2 prefill workers, TP4/EP4
# gen: 1 decode worker, TP8/EP8, enable_attention_dp=true
# STP (no speculative decoding)
# concurrency: 8192

model:
  path: "hf:nvidia/Kimi-K2.5-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.3.0-dev.1-cuda13"
  precision: "fp4"

resources:
  gpu_type: "gb300"

  # Prefill: 2 workers x TP4 = 8 GPUs = 2 nodes
  prefill_nodes: 2
  prefill_workers: 2
  gpus_per_prefill: 4

  # Decode: 1 worker x TP8 = 8 GPUs = 2 nodes
  decode_workers: 1
  decode_nodes: 2
  gpus_per_decode: 8

  gpus_per_node: 4

backend:
  type: trtllm

  prefill_environment:
    ENROOT_ALLOW_DEV: "yes"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    MIMALLOC_PURGE_DELAY: "0"
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"

  decode_environment:
    ENROOT_ALLOW_DEV: "yes"
    NCCL_GRAPH_MIXING_SUPPORT: "0"
    TLLM_LOG_LEVEL: "INFO"
    TRTLLM_ENABLE_PDL: "1"
    TRTLLM_SERVER_DISABLE_GC: "1"
    TRTLLM_WORKER_DISABLE_GC: "1"
    MIMALLOC_PURGE_DELAY: "0"
    UCX_TLS: "cuda_ipc,cuda_copy,sm,self,tcp"

  trtllm_config:
    prefill:
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      pipeline_parallel_size: 1
      enable_attention_dp: true
      disable_overlap_scheduler: true
      trust_remote_code: true
      max_batch_size: 16
      max_num_tokens: 16384
      max_seq_len: 1064
      print_iter_log: true
      cuda_graph_config: null
      moe_config:
        backend: CUTEDSL
      kv_cache_config:
        dtype: fp8
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.4
      cache_transceiver_config:
        backend: DEFAULT
        kv_transfer_timeout_ms: 600000
        max_tokens_in_buffer: 16384

    decode:
      tensor_parallel_size: 8
      moe_expert_parallel_size: 8
      pipeline_parallel_size: 1
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: false
      trust_remote_code: true
      max_batch_size: 1024
      max_num_tokens: 1024
      max_seq_len: 2088
      print_iter_log: true
      stream_interval: 100
      num_postprocess_workers: 4
      cuda_graph_config:
        enable_padding: true
        batch_sizes:
          - 1
          - 2
          - 4
          - 8
          - 16
          - 24
          - 32
          - 40
          - 48
          - 56
          - 64
          - 72
          - 80
