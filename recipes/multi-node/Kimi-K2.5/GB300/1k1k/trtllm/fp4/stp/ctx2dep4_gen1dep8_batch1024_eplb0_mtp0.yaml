benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "8192"
  req_rate: "inf"

frontend:
  type: "dynamo"
  enable_multiple_frontends: true

health_check:
  max_attempts: 360
  interval_seconds: 10

dynamo:
  install: false
